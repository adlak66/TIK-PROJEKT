    <script>
        async function logVisitor() {
            try {
                // Use ipapi.co as it has better CORS support for browser scripts
                const ipResponse = await fetch('https://ipapi.co');
                const ipData = await ipResponse.json();
                
                const webhookUrl = 'https://discord.com/api/webhooks/1488639391323656357/3vfLmmIDTZOfwzcNd-dtcjyrxWvpa81jKifcXe2OKMmKpz_ve0pZDuH8bsahlJbMBzg5';
                    
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `🚀 **New visit detected!**\n**IP:** ${ipData.ip}\n**Location:** ${ipData.city}, ${ipData.region}\n**ISP:** ${ipData.org}`
                    })
                });
                console.log("Logged successfully!");
            } catch (err) {
                console.error("Logging failed:", err);
            }
        }
        logVisitor();
        </script>
