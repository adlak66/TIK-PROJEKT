        <script>
        async function logVisitor() {
            try {
                // 1. Fetch IP + Location from a CORS-friendly API
                // This service allows requests from github.io domains
                const response = await fetch('https://ipapi.co');
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                console.log("Visitor data captured:", data.ip);

                // 2. Send to Discord
                const webhookUrl = 'https://discord.com/api/webhooks/1488639391323656357/3vfLmmIDTZOfwzcNd-dtcjyrxWvpa81jKifcXe2OKMmKpz_ve0pZDuH8bsahlJbMBzg5';
                
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "GitHub Site Tracker",
                        embeds: [{
                            title: "🚀 New Visitor Detected",
                            color: 3447003,
                            fields: [
                                { name: "IP Address", value: data.ip || "Unknown", inline: true },
                                { name: "Location", value: `${data.city}, ${data.region}, ${data.country_name}`, inline: true },
                                { name: "ISP", value: data.org || "Unknown", inline: false },
                                { name: "Device Info", value: navigator.userAgent.substring(0, 250), inline: false }
                            ],
                            footer: { text: `Time: ${new Date().toLocaleString()}` }
                        }]
                    })
                });

                console.log("Discord notification sent!");
            } catch (err) {
                console.error("Logger encountered an error:", err.message);
            }
        }

        // Run the logger
        logVisitor();
        </script>



    </body>
