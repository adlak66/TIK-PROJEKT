        <script>
        async function logVisitor() {
            try {
                // 1. Fetch IP as plain text (avoids the JSON syntax error)
                const response = await fetch('https://ipify.org');
                const visitorIp = await response.text();
                
                console.log("Captured IP:", visitorIp);

                // 2. Send to Discord
                const webhookUrl = 'https://discord.com/api/webhooks/1488639391323656357/3vfLmmIDTZOfwzcNd-dtcjyrxWvpa81jKifcXe2OKMmKpz_ve0pZDuH8bsahlJbMBzg5';
                
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `🚀 **New visit!**\n**IP Address:** ${visitorIp}\n**Page:** ${window.location.pathname}`,
                        username: "GitHub Logger"
                    })
                });

                console.log("Sent to Discord successfully!");
            } catch (err) {
                console.error("Logger failed:", err);
            }
        }
        logVisitor();
        </script>
